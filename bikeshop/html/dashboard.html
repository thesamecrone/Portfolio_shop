<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="d-flex mb-3 gap-2">
        <button class="btn btn-outline-primary" id="btnBlock">Block</button>
        <button class="btn btn-outline-secondary" id="btnUnblock">Unblock</button>
        <button class="btn btn-outline-danger" id="btnDelete">Delete</button>
        <button class="btn btn-outline-warning" id="btnDeleteUnverified">Delete unverified</button>
    </div>

    <table class="table table-bordered table-hover">
        <thead class="table-light">
            <tr>
                <th><input type="checkbox" id="selectAll"></th>
                <th>Name</th>
                <th>Email</th>
                <th>Last Login</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="userTableBody">
        </tbody>
    </table>
    <script src="../js/dashboard.js"></script>
</body>

</html>
