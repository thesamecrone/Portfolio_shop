<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <div class="d-flex mb-3 gap-2">
        <button class="btn btn-outline-primary" id="btnBlock" data-bs-toggle="tooltip"
            title="Block users">Block</button>

        <button class="btn btn-outline-secondary" id="btnUnblock" data-bs-toggle="tooltip" title="Unblock users">
            <i class="bi bi-unlock"></i>
        </button>

        <button class="btn btn-outline-danger" id="btnDelete" data-bs-toggle="tooltip" title="Delete users">
            <i class="bi bi-trash"></i>
        </button>

        <button class="btn btn-outline-warning" id="btnDeleteUnverified" data-bs-toggle="tooltip"
            title="Delete unverified">
            <i class="bi bi-person-x"></i>
        </button>
    </div>

    <table class="table table-bordered table-hover">
        <thead class="table-light">
            <tr>
                <th><input type="checkbox" id="selectAll"></th>
                <th>Name</th>
                <th>Email</th>
                <th>Last Login</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="userTableBody">
        </tbody>
    </table>
    <script src="../js/dashboard.js"></script>
</body>

</html>
